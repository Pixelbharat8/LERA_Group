name: LERA Full CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same branch — saves Actions minutes when
# someone force-pushes during a long CI cycle.
concurrency:
  group: lera-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ###########################################################
  # 0. Secret scan — fail fast if a credential is committed.
  #    Runs before everything so a leaked secret blocks the
  #    whole pipeline (and is visible on every PR).
  ###########################################################
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan past commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ###########################################################
  # 1. Backend tests (JUnit) — runs first so a red unit test
  #    short-circuits the rest of the pipeline.
  #
  # Tier-1 decision (all run mvn test): every Spring Boot service in this repo
  # that ships JUnit under backend/*/src/test and backs routed UI/API flows:
  #   • identity, academy, connect — auth + LMS + CRM core
  #   • attendance, payment, payroll — operations / money paths
  #   • rule_engine, ai_gateway — next.config.js rewrites (8088/8087)
  #   • social_media_service — /api/social* rewrites when enabled
  # Compile-only (no separate tier) would miss regressions in those domains.
  ###########################################################
  test-backend:
    name: Backend tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      fail-fast: false
      matrix:
        service: [
          academy_service,
          attendance_service,
          connect_service,
          identity_service,
          payment_service,
          payroll_service,
          rule_engine,
          ai_gateway,
          social_media_service
        ]

    steps:
      - uses: actions/checkout@v4

      - name: Reject nested workspace
        run: '! test -d LERA_Group'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: |
          cd backend/${{ matrix.service }}
          mvn -B -ntp test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/
          retention-days: 7
          if-no-files-found: ignore

  ###########################################################
  # 2. Build all backend microservices (no tests — same services already tested in job 1).
  ###########################################################
  build-backend:
    name: Build Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test-backend

    strategy:
      fail-fast: false
      matrix:
        service: [
          academy_service,
          attendance_service,
          connect_service,
          identity_service,
          payment_service,
          payroll_service,
          rule_engine,
          ai_gateway,
          social_media_service
        ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build (skip tests — already run in job 1)
        run: |
          if [ -d "backend/${{ matrix.service }}" ]; then
            cd backend/${{ matrix.service }}
            mvn -B -ntp -DskipTests clean package
          else
            echo "Service ${{ matrix.service }} not present — skipping."
          fi

  ###########################################################
  # 3. Frontend lint + build.
  ###########################################################
  build-frontend:
    name: Build Next.js Frontend
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Install Playwright (Chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        working-directory: frontend
        env:
          CI: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
        run: npx playwright test

  ###########################################################
  # 4. Build & push Docker images. Only on `main` — PR builds
  #    don't push, which keeps the registry clean and avoids
  #    leaking ephemeral images.
  ###########################################################
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend images
        run: |
          set -euo pipefail
          for svc in academy_service attendance_service connect_service identity_service payment_service payroll_service rule_engine ai_gateway social_media_service; do
            if [ -f "backend/$svc/Dockerfile" ]; then
              echo "Building image for $svc..."
              docker build -t ${{ secrets.DOCKER_USERNAME }}/$svc:latest backend/$svc
              docker push ${{ secrets.DOCKER_USERNAME }}/$svc:latest
            else
              echo "Skipping $svc — no Dockerfile."
            fi
          done

      - name: Build & push frontend image
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t ${{ secrets.DOCKER_USERNAME }}/lera_frontend:latest frontend
            docker push ${{ secrets.DOCKER_USERNAME }}/lera_frontend:latest
          fi

  ###########################################################
  # 5. Deployment placeholder — wire up when the VPS exists.
  ###########################################################
  deploy:
    if: false
    name: Deployment Disabled
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - run: echo "Deployment skipped — no VPS configured."
