# Server Configuration
server.port=8086
spring.application.name=connect-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lera}
spring.datasource.username=${DB_USER:lera}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA Configuration
# Avoid unsafe schema auto-migrations against an already-initialized DB schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# When Flyway is enabled, avoid circular deps between Flyway + JPA (see academy_service).
spring.jpa.defer-datasource-initialization=false

# SQL Initialization - seed marketing data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.com.lera.connect_service=INFO
logging.level.org.springframework.web=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
# Don't fail health when SMTP is unconfigured locally
management.health.mail.enabled=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Email Configuration (set spring.mail.enabled=true to activate)
spring.mail.enabled=false
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:noreply@leraacademy.edu.vn}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Flyway — runs BEFORE Hibernate; baseline-on-migrate=true adopts existing dev DBs cleanly.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_connect_history

# Chat / story attachments (local disk under uploads/chat/)
lera.attachments.dir=${LERA_ATTACHMENTS_DIR:uploads/}

# ----- Native push (APNs / FCM) -----
# Off by default. Set lera.push.enabled=true and add the credentials below to
# turn dry-run into real delivery. Either provider can be left blank — we just
# skip that platform's tokens.
lera.push.enabled=${LERA_PUSH_ENABLED:false}

# APNs token-based auth — generate the .p8 in the Apple Developer portal.
lera.push.apns.team-id=${APNS_TEAM_ID:}
lera.push.apns.key-id=${APNS_KEY_ID:}
lera.push.apns.bundle-id=${APNS_BUNDLE_ID:com.lera.app}
lera.push.apns.key-path=${APNS_KEY_PATH:}
lera.push.apns.key-pem=${APNS_KEY_PEM:}
lera.push.apns.sandbox=${APNS_SANDBOX:true}

# FCM HTTP v1 — needs a service-account JSON with messaging permissions.
lera.push.fcm.project-id=${FCM_PROJECT_ID:}
lera.push.fcm.service-account-path=${FCM_SERVICE_ACCOUNT_PATH:}
lera.push.fcm.service-account-json=${FCM_SERVICE_ACCOUNT_JSON:}

# Web Push (browser Push API) — VAPID keys; pair with frontend NEXT_PUBLIC_VAPID_PUBLIC_KEY.
# Generate: npx web-push generate-vapid-keys   OR   ./scripts/generate-vapid-keys.sh
lera.push.web.vapid.public-key=${WEB_PUSH_VAPID_PUBLIC_KEY:}
lera.push.web.vapid.private-key=${WEB_PUSH_VAPID_PRIVATE_KEY:}
lera.push.web.vapid.subject=${WEB_PUSH_VAPID_SUBJECT:mailto:support@leraacademy.edu.vn}

# --- CRM lead convert → Academy placement sync (English-centre funnel) ---
# Ops reference: PLACEMENT_SYNC_ENV.md (same directory as pom.xml).
# Connect calls: POST {lera.academy.base-url}/api/internal/student-skill-levels/placement-record
# Header: X-Internal-Key: <same value as academy_service lera.internal.api-key>
#
# Required in every deployment where staff convert leads with linked students:
#   LERA_ACADEMY_URL   — Base URL of academy_service (no trailing slash). Examples:
#                        Docker Compose: http://academy:8082
#                        Kubernetes:     http://academy-service:8082
#                        Local dev:      http://localhost:8082
#   LERA_INTERNAL_API_KEY — Shared secret; must match academy_service (see that service’s
#                        lera.internal.api-key). If missing or wrong, convert still succeeds
#                        but placementSync will report INTERNAL_KEY_MISSING or ACADEMY_HTTP_ERROR.
#                        Default is intentionally blank: the legacy literal
#                        LERA_INTERNAL_SVC_KEY_2024 used to ship as a fallback but is in public
#                        git history. InternalApiKeyValidator refuses to start under
#                        spring.profiles.active=prod when the key is blank or equal to that literal.
#
# Readiness: there is no automatic Academy ping; wrong LERA_ACADEMY_URL shows up as
# ACADEMY_UNREACHABLE in the convert response (placementSync) and in logs (placement_sync ...).
lera.internal.api-key=${LERA_INTERNAL_API_KEY:}
lera.academy.base-url=${LERA_ACADEMY_URL:http://localhost:8082}

# Correlation id (set by CorrelationIdFilter) in every log line
logging.pattern.level=%5p [traceId=%X{traceId:-}]
