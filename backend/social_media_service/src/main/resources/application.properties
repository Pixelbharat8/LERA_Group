# Server Configuration
server.port=8089
spring.application.name=social-media-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lera}
spring.datasource.username=${DB_USER:lera}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# SQL Initialization - seed marketing data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.com.lera.social_media_service=INFO
logging.level.org.springframework.web=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ===== EXTERNAL SOCIAL MEDIA API CONFIGURATIONS =====

# Facebook/Meta API
facebook.app.id=${FACEBOOK_APP_ID:}
facebook.app.secret=${FACEBOOK_APP_SECRET:}
facebook.graph.api.version=v18.0
facebook.graph.api.base-url=https://graph.facebook.com

# Instagram API (via Facebook Graph API)
instagram.api.base-url=https://graph.facebook.com

# TikTok API
tiktok.client.key=${TIKTOK_CLIENT_KEY:}
tiktok.client.secret=${TIKTOK_CLIENT_SECRET:}
tiktok.api.base-url=https://open.tiktokapis.com

# YouTube Data API
youtube.api.key=${YOUTUBE_API_KEY:}
youtube.api.base-url=https://www.googleapis.com/youtube/v3

# Zalo API
zalo.app.id=${ZALO_APP_ID:}
zalo.app.secret=${ZALO_APP_SECRET:}
zalo.api.base-url=https://openapi.zalo.me

# Google Ads API
google.ads.developer-token=${GOOGLE_ADS_DEVELOPER_TOKEN:}
google.ads.client-id=${GOOGLE_ADS_CLIENT_ID:}
google.ads.client-secret=${GOOGLE_ADS_CLIENT_SECRET:}

# Flyway — runs BEFORE Hibernate; baseline-on-migrate=true adopts existing dev DBs cleanly.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_social_media_history

# Correlation id (set by CorrelationIdFilter) in every log line
logging.pattern.level=%5p [traceId=%X{traceId:-}]
