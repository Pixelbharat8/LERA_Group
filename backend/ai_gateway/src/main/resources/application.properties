# Server Configuration
server.port=8087
spring.application.name=ai-gateway

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lera}
spring.datasource.username=${DB_USER:lera}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# SQL initialization (loads data.sql after Hibernate creates tables)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.com.lera.ai_gateway=INFO
logging.level.org.springframework.web=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Academy internal API (student entity access checks)
lera.academy.base-url=${LERA_ACADEMY_URL:http://localhost:8082}
lera.internal.api-key=${LERA_INTERNAL_API_KEY:}

# AI provider (provider-agnostic). Set AI_BASE_URL to any OpenAI-compatible /chat/completions
# endpoint — e.g. the in-house Axiom gateway; AI_API_KEY is optional for an internal gateway.
# Falls back to OPENAI_* and finally OpenAI's public API when unset.
openai.api.key=${AI_API_KEY:${OPENAI_API_KEY:}}
openai.api.url=${AI_BASE_URL:https://api.openai.com/v1/chat/completions}
openai.model=${AI_MODEL:${OPENAI_MODEL:gpt-4o-mini}}
openai.max-tokens=2000
openai.temperature=0.7

# Google Gemini API Configuration (alternative)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# Claude API Configuration (alternative)
claude.api.key=${CLAUDE_API_KEY:}
claude.api.url=https://api.anthropic.com/v1/messages

# AI Settings
ai.default.provider=${AI_PROVIDER:openai}
ai.fallback.enabled=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Flyway — runs BEFORE Hibernate; baseline-on-migrate=true adopts existing dev DBs cleanly.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_ai_gateway_history

# Correlation id (set by CorrelationIdFilter) in every log line
logging.pattern.level=%5p [traceId=%X{traceId:-}]
