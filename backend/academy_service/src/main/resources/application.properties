# Server Configuration
server.port=8082
spring.application.name=academy-service

# Database Configuration
# - Local default: localhost
# - Docker overrides via env: DB_HOST=postgres, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lera}
spring.datasource.username=${DB_USER:lera}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Avoid unsafe schema auto-migrations against an already-initialized DB schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# When Flyway is enabled, let Flyway own the initialization order.
# (defer-datasource-initialization can cause circular deps between Flyway + JPA)
spring.jpa.defer-datasource-initialization=false

# SQL initialization (runs after Flyway; safe for data seeds)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Attendance / payroll service (class session → teacher_sessions sync)
attendance.service.url=${ATTENDANCE_SERVICE_URL:http://localhost:8085}

# Internal service-to-service API key — connect_service must send the same value in
# X-Internal-Key for /api/internal/** (e.g. placement-record after CRM lead convert).
# Must match connect_service LERA_INTERNAL_API_KEY — see docs/ops/connect-academy-placement.md at repo root.
# Env: LERA_INTERNAL_API_KEY (set in both connect_service and academy_service).
# Default is intentionally blank: the legacy literal LERA_INTERNAL_SVC_KEY_2024 used to ship here
# but lives in public git history, so InternalApiKeyValidator now refuses to start under
# spring.profiles.active=prod when the key is blank or equal to that literal. In dev profiles a
# blank key just means /api/internal/* returns 503 (see InternalApiKeyAuthFilter).
lera.internal.api-key=${LERA_INTERNAL_API_KEY:}

# Logging
logging.level.com.lera.academy_service=INFO
logging.level.org.springframework.web=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Flyway — runs BEFORE Hibernate; baseline-on-migrate=true adopts existing dev DBs cleanly.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_academy_history

# File storage — local disk (default) or S3/MinIO (lera.storage.backend=s3)
lera.storage.backend=${LERA_STORAGE_BACKEND:local}
lera.storage.local-dir=${LERA_UPLOAD_DIR:}
lera.storage.s3.bucket=${AWS_S3_BUCKET:}
lera.storage.s3.region=${AWS_REGION:ap-southeast-1}
lera.storage.s3.endpoint=${AWS_S3_ENDPOINT:}
lera.storage.s3.public-base-url=${LERA_STORAGE_PUBLIC_BASE_URL:}
lera.storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
lera.storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
lera.storage.s3.path-style-access=${AWS_S3_PATH_STYLE:true}

# Correlation id (set by CorrelationIdFilter) in every log line
logging.pattern.level=%5p [traceId=%X{traceId:-}]
