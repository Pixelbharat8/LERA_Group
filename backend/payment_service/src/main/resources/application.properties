# Server Configuration
server.port=8083
spring.application.name=payment-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lera}
spring.datasource.username=${DB_USER:lera}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Avoid unsafe schema auto-migrations against an already-initialized DB schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# SQL initialization (loads data.sql after Hibernate creates tables)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Public website base URL (where the VNPay return redirects the user back to)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# VNPay payment gateway (https://vnpayment.vn). Online payment stays OFF until both
# VNPAY_TMN_CODE and VNPAY_HASH_SECRET are set — then the website's "Pay online" option
# activates automatically. Use the sandbox URL + your sandbox credentials to test first.
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8083/api/public/payment/vnpay-return}
vnpay.version=2.1.0

# Logging
logging.level.com.lera.payment_service=INFO
logging.level.org.springframework.web=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Flyway — runs BEFORE Hibernate; baseline-on-migrate=true adopts existing dev DBs cleanly.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_payment_history

# Correlation id (set by CorrelationIdFilter) in every log line
logging.pattern.level=%5p [traceId=%X{traceId:-}]
