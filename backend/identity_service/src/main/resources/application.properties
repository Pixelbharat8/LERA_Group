server.port=8081

spring.application.name=identity-service

# Database
# - Local default: localhost
# - Docker overrides via env: DB_HOST=postgres, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lera}
spring.datasource.username=${DB_USER:lera}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Avoid unsafe schema auto-migrations against an already-initialized DB schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# Flyway — runs BEFORE Hibernate; baseline-on-migrate=true adopts existing dev DBs cleanly.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_identity_history

# SQL initialization (loads data.sql after Hibernate creates tables)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Internal service-to-service API key — must match academy/connect.
# Default is intentionally blank: the legacy literal LERA_INTERNAL_SVC_KEY_2024 used to ship here
# but lives in public git history. InternalApiKeyValidator refuses to start under
# spring.profiles.active=prod when the key is blank or equal to that literal.
lera.internal.api-key=${LERA_INTERNAL_API_KEY:}

# Logging
logging.level.com.lera=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Correlation id (set by CorrelationIdFilter) in every log line
logging.pattern.level=%5p [traceId=%X{traceId:-}]
