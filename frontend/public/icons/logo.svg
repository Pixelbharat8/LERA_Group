<?xml version="1.0" encoding="UTF-8"?>
<!--
LERA brand placeholder. Square 1024�1024 logo intended as the input source
for `npm run mobile:icons`, which fans this SVG out to every iOS/Android/PWA
size Capacitor expects. Replace with the real artwork before shipping to
the App Store / Play Store; the generator will pick the new file up
automatically.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#g)"/>
  <text x="512" y="600" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="380" font-weight="800" fill="#ffffff" letter-spacing="-12">L</text>
</svg>
