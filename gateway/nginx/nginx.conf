worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    sendfile on;
    server_tokens off;

    # Allow larger uploads (avatars, CSV imports, attachments).
    client_max_body_size 25m;

    # Reasonable proxy timeouts — long enough for AI streaming, short enough
    # to fail fast on a hung upstream.
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     120s;

    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript;

    # Common proxy headers shared across every /api/... location.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ========= RATE LIMITING ==========
    # Two zones: one tight zone for authentication / sensitive endpoints,
    # and one looser zone for everything else. Each zone keys on $binary_remote_addr
    # and is sized for ~16k unique clients.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=60r/s;
    limit_req_status 429;

    # ========= UPSTREAM SERVICES ==========
    upstream academy_service       { server academy_service:8082; }
    upstream attendance_service    { server attendance_service:8085; }
    upstream connect_service       { server connect_service:8086; }
    upstream identity_service      { server identity_service:8081; }
    upstream payment_service       { server payment_service:8083; }
    upstream payroll_service       { server payroll_service:8084; }
    upstream rule_engine           { server rule_engine:8088; }
    upstream ai_gateway            { server ai_gateway:8087; }
    upstream social_media_service  { server social_media_service:8089; }
    upstream frontend              { server frontend:3000; }

    server {
        # Container listens on 8080 (unprivileged nginx, non-root). The host/LB still
        # publishes 80/443 and maps to this port.
        listen 8080;
        server_name _;

        # ========= GLOBAL CORS ==========
        # The frontend is served from the same origin via the fallback below,
        # so CORS at this layer mostly matters for native/mobile clients.
        # Each Spring service ALSO enforces CORS via its own SecurityConfig —
        # this block is the gateway's outer fence.
        #
        # We only echo the Origin header back when it is in the allowlist.
        # Add production domains to the `map` block below before deploying.
        set $cors_allowed_origin "";
        if ($http_origin ~* ^(https?://(localhost|127\.0\.0\.1)(:[0-9]+)?|https?://([a-z0-9-]+\.)?leraacademy\.edu\.vn)$) {
            set $cors_allowed_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin  $cors_allowed_origin always;
        add_header Vary                         "Origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Internal-Key" always;
        add_header Access-Control-Allow-Credentials true always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ========= GATEWAY HEALTH ==========
        location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        # ============================================================
        # API ROUTING — keep this in sync with frontend/next.config.js
        # ============================================================

        # ---------- identity_service (8081) ----------
        # Auth endpoints get the tight rate-limit (10 r/s, burst 20).
        location ^~ /api/auth/             {
            limit_req  zone=auth_zone burst=20 nodelay;
            proxy_pass http://identity_service;
        }
        location ^~ /api/users             { proxy_pass http://identity_service; }
        location ^~ /api/roles             { proxy_pass http://identity_service; }
        location ^~ /api/centers           { proxy_pass http://identity_service; }
        location ^~ /api/tenants           { proxy_pass http://identity_service; }
        location ^~ /api/permissions       { proxy_pass http://identity_service; }
        location ^~ /api/departments       { proxy_pass http://identity_service; }
        location ^~ /api/impersonation     { proxy_pass http://identity_service; }
        location ^~ /api/custom-fields     { proxy_pass http://identity_service; }
        location ^~ /api/custom-field-values { proxy_pass http://identity_service; }
        location ^~ /api/feature-flags     { proxy_pass http://identity_service; }
        location ^~ /api/system-settings   { proxy_pass http://identity_service; }
        location ^~ /api/website-settings  { proxy_pass http://identity_service; }
        location ^~ /api/tenant-settings   { proxy_pass http://identity_service; }
        location ^~ /api/login-history     { proxy_pass http://identity_service; }
        location ^~ /api/approvals         { proxy_pass http://identity_service; }
        location ^~ /api/user-permissions  { proxy_pass http://identity_service; }
        location ^~ /api/user-roles        { proxy_pass http://identity_service; }
        location ^~ /api/activity-logs     { proxy_pass http://identity_service; }
        location ^~ /api/dropdown-options  { proxy_pass http://identity_service; }
        location ^~ /api/staff             { proxy_pass http://identity_service; }
        location ^~ /api/audit-logs        { proxy_pass http://identity_service; }
        location ^~ /api/me                { proxy_pass http://identity_service; }
        location ^~ /api/profile           { proxy_pass http://identity_service; }
        location ^~ /api/dashboard         { proxy_pass http://identity_service; }
        location ^~ /api/health            { proxy_pass http://identity_service; }

        # ---------- academy_service (8082) ----------
        location ^~ /api/students          { proxy_pass http://academy_service; }
        location ^~ /api/report-cards      { proxy_pass http://academy_service; }
        location ^~ /api/student-registrations { proxy_pass http://academy_service; }
        location ^~ /api/student-parents   { proxy_pass http://academy_service; }
        location ^~ /api/student-documents { proxy_pass http://academy_service; }
        location ^~ /api/student-points    { proxy_pass http://academy_service; }
        location ^~ /api/student-skill-levels { proxy_pass http://academy_service; }
        location ^~ /api/student-transport { proxy_pass http://academy_service; }
        location ^~ /api/parents           { proxy_pass http://academy_service; }
        location ^~ /api/parent-students   { proxy_pass http://academy_service; }
        location ^~ /api/teachers          { proxy_pass http://academy_service; }
        location ^~ /api/teacher-documents { proxy_pass http://academy_service; }
        location ^~ /api/teacher-skill-levels { proxy_pass http://academy_service; }
        location ^~ /api/classes           { proxy_pass http://academy_service; }
        location ^~ /api/class-schedules   { proxy_pass http://academy_service; }
        location ^~ /api/class-schedule-exceptions { proxy_pass http://academy_service; }
        location ^~ /api/class-sessions    { proxy_pass http://academy_service; }
        location ^~ /api/class-switch      { proxy_pass http://academy_service; }
        location ^~ /api/session-attendance { proxy_pass http://academy_service; }
        location ^~ /api/courses           { proxy_pass http://academy_service; }
        location ^~ /api/course-modules    { proxy_pass http://academy_service; }
        location ^~ /api/course-lessons    { proxy_pass http://academy_service; }
        location ^~ /api/course-materials  { proxy_pass http://academy_service; }
        location ^~ /api/programs          { proxy_pass http://academy_service; }
        location ^~ /api/enrollments       { proxy_pass http://academy_service; }
        location ^~ /api/renewals          { proxy_pass http://academy_service; }
        location ^~ /api/training-sessions { proxy_pass http://academy_service; }
        location ^~ /api/staff-certifications { proxy_pass http://academy_service; }
        location ^~ /api/performance-reviews { proxy_pass http://academy_service; }
        location ^~ /api/job-openings       { proxy_pass http://academy_service; }
        location ^~ /api/exams             { proxy_pass http://academy_service; }
        location ^~ /api/exam-results      { proxy_pass http://academy_service; }
        location ^~ /api/grades            { proxy_pass http://academy_service; }
        location ^~ /api/timetable         { proxy_pass http://academy_service; }
        location ^~ /api/schedules         { proxy_pass http://academy_service; }
        location ^~ /api/calendar          { proxy_pass http://academy_service; }
        location ^~ /api/curriculum        { proxy_pass http://academy_service; }
        location ^~ /api/lesson-plans      { proxy_pass http://academy_service; }
        location ^~ /api/assignments       { proxy_pass http://academy_service; }
        location ^~ /api/assignment-submissions { proxy_pass http://academy_service; }
        location ^~ /api/certificates      { proxy_pass http://academy_service; }
        location ^~ /api/certificate-templates { proxy_pass http://academy_service; }
        location ^~ /api/gamification      { proxy_pass http://academy_service; }
        location ^~ /api/point-transactions { proxy_pass http://academy_service; }
        location ^~ /api/reports           { proxy_pass http://academy_service; }
        location ^~ /api/import            { proxy_pass http://academy_service; }
        location ^~ /api/upload            { proxy_pass http://academy_service; }
        location ^~ /uploads/               { proxy_pass http://academy_service; }
        location ^~ /api/feedback          { proxy_pass http://academy_service; }
        location ^~ /api/faqs              { proxy_pass http://academy_service; }
        location ^~ /api/form-configs      { proxy_pass http://academy_service; }
        location ^~ /api/user-activity     { proxy_pass http://academy_service; }
        location ^~ /api/referrals         { proxy_pass http://academy_service; }

        # CMS / public website (academy_service)
        location ^~ /api/blog              { proxy_pass http://academy_service; }
        location ^~ /api/contact           { proxy_pass http://academy_service; }
        location ^~ /api/public            { proxy_pass http://academy_service; }
        location ^~ /api/cms-settings      { proxy_pass http://academy_service; }
        location ^~ /api/cms-pages         { proxy_pass http://academy_service; }
        location ^~ /api/center-settings   { proxy_pass http://academy_service; }
        location ^~ /api/footer-settings   { proxy_pass http://academy_service; }
        location ^~ /api/banners           { proxy_pass http://academy_service; }
        location ^~ /api/testimonials      { proxy_pass http://academy_service; }
        location ^~ /api/leadership-members { proxy_pass http://academy_service; }
        location ^~ /api/team-members      { proxy_pass http://academy_service; }
        location ^~ /api/media             { proxy_pass http://academy_service; }

        # Library, bookstore, hostel — implementations live in academy_service
        location ^~ /api/library           { proxy_pass http://academy_service; }
        location ^~ /api/library-fines     { proxy_pass http://academy_service; }
        location ^~ /api/library-inventory { proxy_pass http://academy_service; }
        location ^~ /api/books             { proxy_pass http://academy_service; }
        location ^~ /api/book-borrowings   { proxy_pass http://academy_service; }
        location ^~ /api/book-reservations { proxy_pass http://academy_service; }
        location ^~ /api/book-categories   { proxy_pass http://academy_service; }
        location ^~ /api/authors           { proxy_pass http://academy_service; }
        location ^~ /api/publishers        { proxy_pass http://academy_service; }
        location ^~ /api/bookstore         { proxy_pass http://academy_service; }
        location ^~ /api/hostel            { proxy_pass http://academy_service; }

        # Transport — academy_service hosts the controllers
        location ^~ /api/transport         { proxy_pass http://academy_service; }
        location ^~ /api/transport-routes  { proxy_pass http://academy_service; }
        location ^~ /api/transport-schedules { proxy_pass http://academy_service; }
        location ^~ /api/transport-attendance { proxy_pass http://academy_service; }
        location ^~ /api/transport-drivers { proxy_pass http://academy_service; }
        location ^~ /api/training-attendance { proxy_pass http://academy_service; }
        location ^~ /api/route-stops       { proxy_pass http://academy_service; }
        location ^~ /api/vehicles          { proxy_pass http://academy_service; }
        location ^~ /api/vehicle-maintenance { proxy_pass http://academy_service; }
        location ^~ /api/gps-tracking      { proxy_pass http://academy_service; }
        location ^~ /api/drivers           { proxy_pass http://academy_service; }

        # Sports — academy_service
        location ^~ /api/sport-types       { proxy_pass http://academy_service; }
        location ^~ /api/sport-facilities  { proxy_pass http://academy_service; }
        location ^~ /api/sport-equipment   { proxy_pass http://academy_service; }
        location ^~ /api/sport-teams       { proxy_pass http://academy_service; }
        location ^~ /api/sport-matches     { proxy_pass http://academy_service; }
        location ^~ /api/sport-training-sessions { proxy_pass http://academy_service; }
        location ^~ /api/tournaments       { proxy_pass http://academy_service; }
        location ^~ /api/tournament-teams  { proxy_pass http://academy_service; }
        location ^~ /api/match-events      { proxy_pass http://academy_service; }
        location ^~ /api/equipment-assignments { proxy_pass http://academy_service; }
        location ^~ /api/facility-bookings { proxy_pass http://academy_service; }
        location ^~ /api/player-statistics { proxy_pass http://academy_service; }

        # ---------- attendance_service (8085) ----------
        location ^~ /api/attendance        { proxy_pass http://attendance_service; }
        location ^~ /api/attendance-exceptions { proxy_pass http://attendance_service; }
        location ^~ /api/leaves            { proxy_pass http://attendance_service; }
        # Aliases — frontend historically uses both /api/leave and /api/teacher-staff-leave.
        # Both must reach the same controllers in attendance_service so that
        # /dashboard/center-admin/attendance/approvals etc. work in production.
        location ^~ /api/leave/            { rewrite ^/api/leave/(.*)$ /api/leaves/$1 break; proxy_pass http://attendance_service; }
        location ^~ /api/leave-requests    { proxy_pass http://attendance_service; }
        location ^~ /api/leave-balance     { proxy_pass http://attendance_service; }
        location ^~ /api/leave-balance-accruals { proxy_pass http://attendance_service; }
        location ^~ /api/teacher-staff-leave { rewrite ^/api/teacher-staff-leave(.*)$ /api/leaves$1 break; proxy_pass http://attendance_service; }
        location ^~ /api/teacher-sessions  { proxy_pass http://attendance_service; }

        # ---------- payment_service (8083) ----------
        location ^~ /api/payments          { proxy_pass http://payment_service; }
        location ^~ /api/invoices          { proxy_pass http://payment_service; }
        location ^~ /api/fee-rules         { proxy_pass http://payment_service; }
        location ^~ /api/fee-receipts      { proxy_pass http://payment_service; }
        location ^~ /api/late-fee-rules    { proxy_pass http://payment_service; }
        location ^~ /api/refunds           { proxy_pass http://payment_service; }
        location ^~ /api/payment-methods   { proxy_pass http://payment_service; }
        location ^~ /api/student-fee-plans { proxy_pass http://payment_service; }
        location ^~ /api/ledger            { proxy_pass http://payment_service; }
        location ^~ /api/discounts         { proxy_pass http://payment_service; }
        location ^~ /api/student-discounts { proxy_pass http://payment_service; }
        location ^~ /api/scholarships      { proxy_pass http://payment_service; }
        location ^~ /api/student-scholarships { proxy_pass http://payment_service; }
        location ^~ /api/finance           { proxy_pass http://payment_service; }

        # ---------- payroll_service (8084) ----------
        location ^~ /api/payroll           { proxy_pass http://payroll_service; }
        location ^~ /api/salary-payouts    { proxy_pass http://payroll_service; }
        location ^~ /api/salary-config     { proxy_pass http://payroll_service; }
        location ^~ /api/salary-components { proxy_pass http://payroll_service; }
        location ^~ /api/payroll-records   { proxy_pass http://payroll_service; }
        location ^~ /api/payroll-cycles    { proxy_pass http://payroll_service; }
        location ^~ /api/tax-settings      { proxy_pass http://payroll_service; }
        location ^~ /api/teacher-overtime  { proxy_pass http://payroll_service; }

        # ---------- connect_service (8086) ----------
        # NOTE: /api/notifications previously routed to identity_service, which
        # has no NotificationController. The implementation lives here.
        location ^~ /api/notifications     { proxy_pass http://connect_service; }
        location ^~ /api/chat              { proxy_pass http://connect_service; }
        location ^~ /api/messages          { proxy_pass http://connect_service; }
        location ^~ /api/broadcasts        { proxy_pass http://connect_service; }
        location ^~ /api/groups            { proxy_pass http://connect_service; }
        location ^~ /api/documents         { proxy_pass http://connect_service; }
        location ^~ /api/stories           { proxy_pass http://connect_service; }
        location ^~ /api/calls             { proxy_pass http://connect_service; }
        location ^~ /api/call-logs         { proxy_pass http://connect_service; }
        location ^~ /api/attachments       { proxy_pass http://connect_service; }
        location ^~ /api/activities        { proxy_pass http://connect_service; }
        location ^~ /api/tasks             { proxy_pass http://connect_service; }
        location ^~ /api/meetings          { proxy_pass http://connect_service; }
        location ^~ /api/parent-teacher-meetings { proxy_pass http://connect_service; }
        # CRM lives in connect_service (LeadController has the richest surface:
        # /{leadId}/followups, /convert, /bulk, etc.). The duplicate in
        # social_media_service is unreachable while this rule is in effect.
        location ^~ /api/leads             { proxy_pass http://connect_service; }
        location ^~ /api/trial-sessions    { proxy_pass http://connect_service; }
        location ^~ /api/messaging         { proxy_pass http://connect_service; }
        location ^~ /api/lead-tags         { proxy_pass http://connect_service; }
        location ^~ /api/lead-notes        { proxy_pass http://connect_service; }
        location ^~ /api/lead-statuses     { proxy_pass http://connect_service; }
        location ^~ /api/lead-activities   { proxy_pass http://connect_service; }
        location ^~ /api/lead-assignments  { proxy_pass http://connect_service; }
        location ^~ /api/lead-followups    { proxy_pass http://connect_service; }
        location ^~ /api/followups         { proxy_pass http://connect_service; }
        # frontend uses both spellings; both must work.
        location ^~ /api/follow-ups        { rewrite ^/api/follow-ups(.*)$ /api/followups$1 break; proxy_pass http://connect_service; }
        location ^~ /api/deals             { proxy_pass http://connect_service; }
        location ^~ /api/email-logs        { proxy_pass http://connect_service; }
        location ^~ /api/crm-triggers      { proxy_pass http://connect_service; }
        location ^~ /api/crm-automations   { proxy_pass http://connect_service; }
        location ^~ /api/campaign-leads    { proxy_pass http://connect_service; }
        location ^~ /api/content-moderation-rules { proxy_pass http://connect_service; }

        # ---------- ai_gateway (8087) ----------
        location ^~ /api/ai                { proxy_pass http://ai_gateway; }
        location ^~ /api/ai-learning-progress { proxy_pass http://ai_gateway; }

        # ---------- rule_engine (8088) ----------
        location ^~ /api/rules             { proxy_pass http://rule_engine; }

        # ---------- social_media_service (8089) ----------
        # Social marketing surface uses dedicated /api/social-* prefixes.
        # /api/leads is intentionally NOT routed here (see connect_service block).
        location ^~ /api/social-media       { proxy_pass http://social_media_service; }
        location ^~ /api/social-platforms   { proxy_pass http://social_media_service; }
        location ^~ /api/social-media-posts { proxy_pass http://social_media_service; }
        location ^~ /api/social-analytics   { proxy_pass http://social_media_service; }
        location ^~ /api/marketing-campaigns { proxy_pass http://social_media_service; }
        location ^~ /api/ad-accounts        { proxy_pass http://social_media_service; }
        location ^~ /api/ad-campaigns       { proxy_pass http://social_media_service; }
        location ^~ /api/content-templates  { proxy_pass http://social_media_service; }
        location ^~ /api/hashtag-groups     { proxy_pass http://social_media_service; }
        # Frontend `/dashboard/social` page calls /api/social/* — bridge to /api/social-media/*.
        location ^~ /api/social/posts       { rewrite ^/api/social/posts(.*)$ /api/social-media/posts$1 break; proxy_pass http://social_media_service; }
        location ^~ /api/social/events      { rewrite ^/api/social/events(.*)$ /api/social-media/events$1 break; proxy_pass http://social_media_service; }

        # ========= FRONTEND FALLBACK ==========
        location / {
            proxy_pass http://frontend;

            # WebSocket upgrade (Next.js HMR in dev, also future SSE/WS use).
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
