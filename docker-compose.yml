version: '3.9'

###############################################################
# Shared definitions (DRY via YAML anchors)
###############################################################
# Log rotation so container stdout can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Resource ceilings for a Spring Boot service (tune per environment).
x-svc-deploy: &svc-deploy
  resources:
    limits:
      cpus: "0.75"
      memory: 768M
    reservations:
      memory: 256M

# Common bits every backend service shares.
x-backend: &backend-common
  restart: unless-stopped
  logging: *default-logging
  deploy: *svc-deploy
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lera-net

services:

  ###############################################################
  # PostgreSQL Database
  ###############################################################
  postgres:
    image: postgres:15
    container_name: lera_postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${DB_USER:-lera}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-lera}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lera} -d ${DB_NAME:-lera}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - lera-net

  ###############################################################
  # PGADMIN (Database GUI)
  ###############################################################
  pgadmin:
    image: dpage/pgadmin4
    container_name: lera_pgadmin
    restart: unless-stopped
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lera.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lera-net

  ###############################################################
  # MinIO (optional S3-compatible object storage for academy uploads)
  # Console: http://localhost:9001  (credentials from MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
  # Create bucket "lera-files" in the console, then set academy env:
  #   LERA_STORAGE_BACKEND=s3
  #   AWS_S3_BUCKET=lera-files
  #   AWS_S3_ENDPOINT=http://minio:9000
  #   AWS_S3_PATH_STYLE=true
  #   LERA_STORAGE_PUBLIC_BASE_URL=http://localhost:9000/lera-files
  ###############################################################
  minio:
    image: minio/minio:latest
    container_name: lera_minio
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lera-net

  ###############################################################
  # Backend Microservice: academy_service
  ###############################################################
  academy_service:
    <<: *backend-common
    build: ./backend/academy_service
    container_name: academy_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
      LERA_STORAGE_BACKEND: ${LERA_STORAGE_BACKEND:-local}
      LERA_UPLOAD_DIR: /var/lera/uploads/
      LERA_ATTACHMENTS_DIR: /var/lera/uploads/
    volumes:
      - lera_uploads:/var/lera/uploads
    ports:
      - "8082:8082"   # academy_service runs on port 8082
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: attendance_service
  ###############################################################
  attendance_service:
    <<: *backend-common
    build: ./backend/attendance_service
    container_name: attendance_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8085:8085"   # attendance_service runs on port 8085
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: connect_service
  ###############################################################
  connect_service:
    <<: *backend-common
    build: ./backend/connect_service
    container_name: connect_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
      LERA_ATTACHMENTS_DIR: /var/lera/uploads/
    volumes:
      - lera_uploads:/var/lera/uploads
    ports:
      - "8086:8086"   # connect_service runs on port 8086
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: identity_service
  ###############################################################
  identity_service:
    <<: *backend-common
    build: ./backend/identity_service
    container_name: identity_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8081:8081"   # identity_service runs on port 8081
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: payment_service
  ###############################################################
  payment_service:
    <<: *backend-common
    build: ./backend/payment_service
    container_name: payment_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8083:8083"   # payment_service runs on port 8083
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: payroll_service
  ###############################################################
  payroll_service:
    <<: *backend-common
    build: ./backend/payroll_service
    container_name: payroll_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8084:8084"   # payroll_service runs on port 8084
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: rule_engine
  ###############################################################
  rule_engine:
    <<: *backend-common
    build: ./backend/rule_engine
    container_name: rule_engine
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8088:8088"   # rule_engine runs on port 8088
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: ai_gateway
  ###############################################################
  ai_gateway:
    <<: *backend-common
    build: ./backend/ai_gateway
    container_name: ai_gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8087:8087"   # ai_gateway runs on port 8087
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Backend Microservice: social_media_service
  ###############################################################
  social_media_service:
    <<: *backend-common
    build: ./backend/social_media_service
    container_name: social_media_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_USER: lera
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: lera
    ports:
      - "8089:8089"   # social_media_service runs on port 8089
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ###############################################################
  # Frontend (Next.js 14)
  ###############################################################
  frontend:
    build: ./frontend
    container_name: lera_frontend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - lera-net

  ###############################################################
  # API GATEWAY (NGINX Reverse Proxy, unprivileged — listens on 8080)
  ###############################################################
  gateway:
    build: ./gateway
    container_name: lera_gateway
    restart: unless-stopped
    logging: *default-logging
    deploy: *svc-deploy
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - frontend
      - academy_service
      - attendance_service
      - connect_service
      - identity_service
      - payment_service
      - payroll_service
      - rule_engine
      - ai_gateway
      - social_media_service
    networks:
      - lera-net


###############################################################
# NETWORKS & VOLUMES
###############################################################
networks:
  lera-net:

volumes:
  postgres_data:
  minio_data:
  lera_uploads:
